name=Fluxgrid
version=0.9.1
author=Lonely Binary
maintainer=Lonely Binary <hello@lonelybinary.cn>
sentence=Dead-simple ESP32 client for the Fluxgrid IoT platform.
paragraph=Connect an ESP32 to your Fluxgrid dashboard in ~10 lines. Wraps WiFi, MQTT, auto-reconnect, Last-Will online/offline, and topic plumbing behind a tiny API: Fluxgrid.write("temp", value) to push telemetry and Fluxgrid.read("relay").asBool() (or onReceive) to react to control widgets. Supports autoConfig() for zero-code sensor drivers (DHT22/DHT11/BME280/DS18B20) — install the corresponding Arduino library and the driver is automatically detected at compile time.
category=Communication
url=https://github.com/Lonely-Binary/Fluxgrid
architectures=esp32
depends=PubSubClient,ArduinoJson
includes=Fluxgrid.h
